# wtfrc configuration

[general]
# Name shown in popup header and coach messages
assistant_name = "wtfrc"

[indexer]
# Paths to scan for config files
scan_paths = [
  "~/.config/i3/config",
  "~/.config/hypr/hyprland.conf",
  "~/.config/kitty/kitty.conf",
  "~/.tmux.conf",
  "~/.zshrc",
  "~/.gitconfig",
  "~/.ssh/config",
]
# Auto-discover configs in ~/.config/
auto_discover = true
# Paths to exclude from auto-discovery
exclude_paths = [
  "~/.config/chromium",
  "~/.config/Code/Cache",
]
# File watcher for automatic re-indexing
watch = false                    # Enable inotify/fswatch watcher
# Re-index schedule (if watch = false)
reindex_schedule = "daily"

[llm.fast]
provider = "ollama"
model = "gemma3:4b"

[llm.strong]
# Used for indexing (requires reliable JSON output).
# wtfrc setup auto-selects the best model for your GPU.
provider = "ollama"
model = "qwen2.5-coder:7b"
# Or use a cloud provider:
# provider = "openai-compat"
# base_url = "https://api.deepseek.com"
# api_key_env = "DEEPSEEK_API_KEY"
# model = "deepseek-chat"

[popup]
# UI frontend for the ask command
frontend = "term"                # "term", "rofi", "tmux" (future)
# Max KB entries to include as LLM context
max_context_entries = 10
# Max conversation history in session
max_history = 5

[session]
# Retention in SQLite before archiving
retain_days = 90
# Archive format
archive_format = "jsonl"

[supervisor]
enabled = true
schedule = "daily"
model_tier = "strong"
retain_reports = 30

[privacy]
# Patterns to always redact from index
redact_patterns = [
  "sk-",
  "xoxb-",
  "ghp_",
  "password",
  "secret",
  "token",
]
# Never index these files
never_index = [
  "~/.ssh/id_*",
  "~/.gnupg/",
  "~/.aws/credentials",
  "**/.env",
]

[coach]
# Enable or disable the coaching daemon.
enabled = true
# Coaching mode: chill (gentle nudges), moderate, or strict.
mode = "chill"
# Maximum number of coaching nudges per hour across all sources.
budget_per_hour = 5
# Minimum seconds between nudges for the same action.
cooldown_seconds = 120
# Quiet hours: no nudges during this range (HH:MM-HH:MM, 24h, empty = always active).
quiet_hours = "22:00-08:00"
# Restrict coaching to a single category ("" = all categories).
focus_category = ""
# Consecutive optimal uses required to graduate an action.
graduation_streak = 7

[coach.layer4]
# Enable OS-level input monitor (evdev/uinput — requires privileges).
enabled = false
# Emit Shift-modifier characters when wrapping key events.
emit_shift_chars = false

[coach.delivery]
# How to deliver coaching messages per source.
# Options: inline (write to FIFO msg file), dunst, libnotify, waybar, tmux status, neovim notify.
shell    = "inline"
hyprland = "dunst"
tmux     = "status"
neovim   = "notify"
default  = "dunst"
# Waybar custom signal number for the coach module.
waybar_signal = 8

[coach.personality]
# Optional custom system-prompt suffix injected into Roaster LLM calls.
custom_prompt = ""
