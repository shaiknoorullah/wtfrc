# wtfrc E2E test Hyprland config
# Minimal config with known keybindings for deterministic testing.

monitor = ,preferred,auto,1

$mod = SUPER

# Known keybindings for E2E tests
bind = $mod, Return, exec, kitty
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod, q, killactive

# Source wtfrc interceptor config (generated by coach start)
source = ~/.config/hypr/wtfrc-intercept.conf

# Basic decoration so Hyprland starts without errors
general {
    gaps_in = 2
    gaps_out = 5
    border_size = 1
}

input {
    follow_mouse = 1
}

# Disable animations for faster testing
animations {
    enabled = false
}
